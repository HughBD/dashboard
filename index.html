<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>William / Command Center</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111;
      --border: #1e1e1e;
      --text: #e4e4e4;
      --muted: #555;
      --accent: #c8a96e;
      --green: #3ecf8e;
      --red: #f06464;
      --white: #fff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .avatar-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); flex-shrink: 0; }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .header-title { font-size: 1rem; font-weight: 700; color: var(--white); letter-spacing: 0.01em; }
    .header-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--green); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* LAYOUT */
    .page { padding: 16px; max-width: 900px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .grid-full { grid-column: 1 / -1; }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .card-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* STAT ROW */
    .stat-row { display: flex; gap: 10px; }
    .stat { background: #181818; border-radius: 8px; padding: 14px 16px; flex: 1; border: 1px solid var(--border); }
    .stat-val { font-size: 1.6rem; font-weight: 700; color: var(--white); }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .gold { color: var(--accent); }

    /* WILLIAM STATUS */
    .w-status { display: flex; align-items: center; gap: 14px; }
    .w-avatar { width: 52px; height: 52px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); flex-shrink: 0; }
    .w-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .w-name { font-size: 1rem; font-weight: 700; color: var(--white); }
    .w-detail { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }

    /* CRYPTO */
    .crypto-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .crypto-row:last-child { border-bottom: none; }
    .crypto-sym { font-weight: 700; font-size: 0.95rem; color: var(--white); }
    .crypto-amt { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .crypto-usd { font-weight: 700; font-size: 0.95rem; text-align: right; }
    .crypto-chg { font-size: 0.75rem; text-align: right; margin-top: 2px; }

    /* EMAIL */
    .email-row { padding: 11px 0; border-bottom: 1px solid var(--border); }
    .email-row:last-child { border-bottom: none; }
    .email-from { font-size: 0.72rem; color: var(--muted); }
    .email-subject { font-size: 0.88rem; font-weight: 500; color: var(--text); margin: 2px 0; }
    .email-date { font-size: 0.7rem; color: var(--border); }

    /* NEWS */
    .news-row { padding: 11px 0; border-bottom: 1px solid var(--border); }
    .news-row:last-child { border-bottom: none; }
    .news-row a { color: var(--text); text-decoration: none; font-size: 0.88rem; line-height: 1.45; display: block; }
    .news-row a:hover { color: var(--accent); }
    .news-src { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    /* FOOTER */
    footer { text-align: center; font-size: 0.68rem; color: #333; padding: 24px 0 16px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="avatar-wrap">
      <img src="william-avatar.jpg" alt="William" onerror="this.style.display='none'" />
    </div>
    <div>
      <div class="header-title">William / Command Center</div>
      <div class="header-sub" id="last-updated">Loading...</div>
    </div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <span>LIVE</span>
  </div>
</header>

<div class="page">
  <div class="grid">

    <!-- William Status -->
    <div class="card">
      <div class="card-label">Agent Status</div>
      <div class="w-status">
        <div class="w-avatar">
          <img src="william-avatar.jpg" alt="William" onerror="this.style.display='none'" />
        </div>
        <div>
          <div class="w-name" id="w-name">William</div>
          <div class="w-detail" id="w-detail">Loading...</div>
        </div>
      </div>
    </div>

    <!-- Portfolio -->
    <div class="card">
      <div class="card-label">Portfolio</div>
      <div class="stat-row">
        <div class="stat">
          <div class="stat-val gold" id="port-total">--</div>
          <div class="stat-lbl">Total USD</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="port-change">--</div>
          <div class="stat-lbl">24h Change</div>
        </div>
      </div>
    </div>

    <!-- Crypto Holdings -->
    <div class="card grid-full">
      <div class="card-label">Crypto Holdings</div>
      <div id="crypto-list"></div>
    </div>

    <!-- Recent Emails -->
    <div class="card">
      <div class="card-label">Recent Emails</div>
      <div id="email-list"></div>
    </div>

    <!-- Headlines -->
    <div class="card">
      <div class="card-label">Headlines</div>
      <div id="news-list"></div>
    </div>

  </div>
</div>

<footer>William &mdash; Command Center &mdash; <span id="footer-ts"></span></footer>

<script>
  async function load() {
    try {
      const r = await fetch('data.json?t=' + Date.now());
      const d = await r.json();

      const ts = new Date(d.updated).toLocaleString('en-CA', { dateStyle: 'medium', timeStyle: 'short' });
      document.getElementById('last-updated').textContent = 'Updated ' + ts;
      document.getElementById('footer-ts').textContent = ts;

      // William
      document.getElementById('w-name').textContent = d.william?.status || 'Online';
      document.getElementById('w-detail').textContent = d.william?.detail || '';

      // Portfolio
      const total = document.getElementById('port-total');
      total.textContent = '$' + (d.portfolio?.total || '--');

      const chg = d.portfolio?.change24h;
      const chgEl = document.getElementById('port-change');
      chgEl.textContent = chg != null ? (chg >= 0 ? '+' : '') + chg + '%' : '--';
      chgEl.className = 'stat-val ' + (chg >= 0 ? 'green' : 'red');

      // Crypto
      document.getElementById('crypto-list').innerHTML = (d.crypto || []).map(c => `
        <div class="crypto-row">
          <div>
            <div class="crypto-sym">${c.symbol}</div>
            <div class="crypto-amt">${c.amount} tokens</div>
          </div>
          <div>
            <div class="crypto-usd ${c.change >= 0 ? 'green' : 'red'}">$${c.usd}</div>
            <div class="crypto-chg ${c.change >= 0 ? 'green' : 'red'}">${c.change >= 0 ? '+' : ''}${c.change}%</div>
          </div>
        </div>`).join('');

      // Email
      document.getElementById('email-list').innerHTML = (d.emails || []).map(e => `
        <div class="email-row">
          <div class="email-from">${e.from}</div>
          <div class="email-subject">${e.subject}</div>
          <div class="email-date">${e.date}</div>
        </div>`).join('');

      // News
      document.getElementById('news-list').innerHTML = (d.news || []).map(n => `
        <div class="news-row">
          <a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>
          <div class="news-src">${n.source}</div>
        </div>`).join('');

    } catch(e) {
      console.error('Dashboard load error:', e);
    }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
